name: QA Automation

on:
  push:
    branches: [main]

  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install chromium --with-deps

      - name: Run all tests (web + mobile) and generate report
        env:
          BASE_URL: ${{ secrets.BASE_URL || 'https://www.saucedemo.com' }}
          VALID_USERNAME: ${{ secrets.VALID_USERNAME || 'standard_user' }}
          VALID_PASSWORD: ${{ secrets.VALID_PASSWORD || 'secret_sauce' }}
        run: npm run allure:run

      - name: Upload HTML reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: cucumber-reports
          path: |
            cucumber-report-web.html
            cucumber-report-mobile.html
          retention-days: 7

      - name: Deploy Allure report to GitHub Pages
        if: always()
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./allure-report
          publish_branch: gh-pages
