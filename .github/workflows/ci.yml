name: QA Automation

on:
  push:
    branches: [main, master]

  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        viewport: [web, mobile]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install chromium --with-deps

      - name: Run tests (${{ matrix.viewport }})
        env:
          BASE_URL: ${{ secrets.BASE_URL || 'https://www.saucedemo.com' }}
          VALID_USERNAME: ${{ secrets.VALID_USERNAME || 'standard_user' }}
          VALID_PASSWORD: ${{ secrets.VALID_PASSWORD || 'secret_sauce' }}
        run: npm run jsity:${{ matrix.viewport }}

      - name: Upload Allure results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: allure-results-${{ matrix.viewport }}
          path: allure-results/
          retention-days: 1

  report:
    needs: test
    runs-on: ubuntu-latest
    if: always()

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Download web results
        uses: actions/download-artifact@v4
        with:
          name: allure-results-web
          path: allure-results/

      - name: Download mobile results
        uses: actions/download-artifact@v4
        with:
          name: allure-results-mobile
          path: allure-results/

      - name: Generate Allure report
        run: npm run allure:generate

      - name: Upload Allure report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: allure-report
          path: allure-report/
          retention-days: 7
